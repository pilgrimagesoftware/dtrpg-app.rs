[package]
name = "dtrpg-core"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
tokio.workspace = true
dtrpg-ui.workspace = true
dtrpg-sdk.workspace = true
gpui_platform.workspace = true
gpui.workspace = true
gpui-component.workspace = true
gpui-component-assets.workspace = true
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
dirs = { workspace = true }
open = { workspace = true }
thiserror = { workspace = true }
rust-embed = { workspace = true }
sentry = { workspace = true, optional = true }
sentry-tracing = { workspace = true, optional = true }

[dev-dependencies]
serde_json = { workspace = true }

[features]
# Enables Sentry crash/error reporting. Compiled in only for CI-built release
# artifacts; source builds (`cargo build`/`cargo test`/`cargo run` with no
# explicit feature flags) never pull in the Sentry dependency.
sentry = ["dep:sentry", "dep:sentry-tracing"]
