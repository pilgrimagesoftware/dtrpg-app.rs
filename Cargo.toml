[package]
name = "dtrpg-app-rust"
version = "0.0.1"
edition = "2024"
description = "DriveThruRPG desktop frontend in Rust"
license = "MIT"

[dependencies]
dtrpg-sdk = { path = "../../dtrpg-sdk/rust" }
anyhow = "1"
gpui = "0.2.2"
tokio = { version = "1", features = ["rt-multi-thread"] }

[dev-dependencies]
pretty_assertions = "1"
