name: Debug

# Standalone diagnostics workflow; does not depend on any step or output
# from build.yaml/nightly.yaml/release.yaml/package.yaml, so it is
# unaffected by the release-packaging-workflow change.

on:
  workflow_dispatch:
    inputs:
      bump-level:
        description: "The level of version bump to calculate the next version (patch, minor, major)."
        required: false
        default: "patch"

permissions:
  contents: read

jobs:
  debug:
    uses: pilgrimagesoftware/github-actions/.github/workflows/debug.yaml@master
