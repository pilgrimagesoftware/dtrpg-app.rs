name: Package

# Reusable workflow that builds installable packages for macOS, Linux, and
# Windows from `dtrpg-core` and publishes/updates a GitHub Release for the
# given tag. Called by `nightly.yaml` (tag: nightly, prerelease: true) and
# `release.yaml` (tag: computed semver, prerelease: false). See
# openspec/changes/add-release-packaging-workflow for the design rationale.

on:
  workflow_call:
    inputs:
      tag:
        description: "The release tag to publish artifacts under (e.g. a semver tag or `nightly`)."
        required: true
        type: string
      prerelease:
        description: "Whether the published GitHub Release is a pre-release."
        required: true
        type: boolean
      ref:
        description: "The git ref to build. Defaults to the ref that triggered the caller workflow."
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    # The Windows leg is unverified against the pinned `gpui` revision (see
    # design.md Open Questions in add-release-packaging-workflow); it must not
    # block nightly/tagged releases for macOS and Linux while that's resolved.
    continue-on-error: ${{ matrix.name == 'Windows' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            target: x86_64-apple-darwin
            formats: dmg
          # Uses the `gnu` target rather than `build.yaml`'s `musl` CI target:
          # AppImage/.deb packaging expects dynamic linking against the
          # system's GUI libraries (X11/Wayland, fontconfig, D-Bus/libsecret),
          # which is impractical to statically link via musl for a GUI app.
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            formats: appimage,deb
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis,wix

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true
          show-progress: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: package-${{ matrix.target }}

      - name: Install Linux packaging dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Package
        env:
          # `crates/dtrpg-core/build.rs` embeds these at compile time when the
          # `sentry` feature is enabled (see before-packaging-command in
          # `crates/dtrpg-core/Cargo.toml`). An unset/empty DSN disables
          # Sentry without failing the build.
          DTRPG_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DTRPG_SENTRY_ENVIRONMENT: ${{ inputs.prerelease && 'nightly' || 'production' }}
          DTRPG_SENTRY_RELEASE: ${{ inputs.tag }}
        run: cargo packager --release --package dtrpg-core --target ${{ matrix.target }} --formats ${{ matrix.formats }} --verbose

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.name }}
          path: |
            target/${{ matrix.target }}/release/*.dmg
            target/${{ matrix.target }}/release/*.AppImage
            target/${{ matrix.target }}/release/*.deb
            target/${{ matrix.target }}/release/*.msi
            target/${{ matrix.target }}/release/*.exe
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: package-*
          merge-multiple: true

      - name: Publish/update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: ${{ inputs.prerelease }}
          removeArtifacts: ${{ inputs.prerelease }}
          replacesArtifacts: true
          artifacts: dist/*
          commit: ${{ inputs.ref || github.sha }}
          generateReleaseNotes: ${{ !inputs.prerelease }}
