name: Package

# Reusable workflow that builds installable packages for macOS, Linux, and
# Windows from `dtrpg-core` and publishes/updates a GitHub Release for the
# given tag. Called by `nightly.yaml` (tag: nightly, prerelease: true) and
# `release.yaml` (tag: computed semver, prerelease: false). See
# openspec/changes/add-release-packaging-workflow for the design rationale.

on:
  workflow_call:
    inputs:
      tag:
        description: "The release tag to publish artifacts under (e.g. a semver tag or `nightly`)."
        required: true
        type: string
      prerelease:
        description: "Whether the published GitHub Release is a pre-release."
        required: true
        type: boolean
      ref:
        description: "The git ref to build. Defaults to the ref that triggered the caller workflow."
        required: false
        type: string
      release_notes:
        description: "Release notes body for the GitHub Release. Falls back to GitHub's auto-generated notes (non-prerelease only) when empty."
        required: false
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always
  SENTRY_ORG: pilgrimage-software
  SENTRY_PROJECT: dtrpg

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    # The Windows leg is unverified against the pinned `gpui` revision (see
    # design.md Open Questions in add-release-packaging-workflow); it must not
    # block nightly/tagged releases for macOS and Linux while that's resolved.
    continue-on-error: ${{ matrix.name == 'Windows' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # `macos-latest` runners are Apple Silicon (arm64); build natively.
          # Intel Mac is not a supported target — see the README's Platform
          # Requirements section.
          - name: macOS
            os: macos-latest
            target: aarch64-apple-darwin
            formats: dmg
          # Uses the `gnu` target rather than `build.yaml`'s `musl` CI target:
          # AppImage/.deb packaging expects dynamic linking against the
          # system's GUI libraries (X11/Wayland, fontconfig, D-Bus/libsecret),
          # which is impractical to statically link via musl for a GUI app.
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            formats: appimage,deb
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis,wix

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true
          show-progress: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: package-${{ matrix.target }}

      - name: Install Linux packaging dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsecret-1-dev \
            libasound2-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Package
        # cargo-packager 0.11 does not resolve a workspace member's
        # `[package.metadata.packager]` when invoked from the workspace root
        # with `--packages`, even with `--manifest-path` pointing at the
        # member - it fails with "Couldn't detect a valid configuration
        # file". Running with cwd inside the crate directory (and dropping
        # `--packages`, since it's then a single-package context) is the
        # combination that actually finds the config.
        working-directory: crates/dtrpg-core
        env:
          # `crates/dtrpg-core/build.rs` embeds these at compile time when the
          # `sentry` feature is enabled (see before-packaging-command in
          # `crates/dtrpg-core/Cargo.toml`). An unset/empty DSN disables
          # Sentry without failing the build.
          DTRPG_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DTRPG_SENTRY_ENVIRONMENT: ${{ inputs.prerelease && 'nightly' || 'production' }}
          DTRPG_SENTRY_RELEASE: ${{ inputs.tag }}
          # `before-packaging-command` in `crates/dtrpg-core/Cargo.toml` runs a
          # plain `cargo build` with no `--target`. Without this, cargo writes
          # the binary to `target/release/` while `cargo packager --target
          # ${{ matrix.target }}` looks for it under
          # `target/${{ matrix.target }}/release/`, so packaging fails with a
          # "file not found" error even though the build itself succeeded.
          # This is unaffected by the working-directory change above - cargo
          # resolves the shared workspace target dir regardless of cwd.
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: |
          cargo packager \
            --release \
            --target ${{ matrix.target }} \
            --formats ${{ matrix.formats }} \
            --verbose

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.name }}
          path: |
            target/${{ matrix.target }}/release/*.dmg
            target/${{ matrix.target }}/release/*.AppImage
            target/${{ matrix.target }}/release/*.deb
            target/${{ matrix.target }}/release/*.msi
            target/${{ matrix.target }}/release/*.exe
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: package-*
          merge-multiple: true

      - name: Publish/update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body: ${{ inputs.release_notes }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: ${{ inputs.prerelease }}
          removeArtifacts: ${{ inputs.prerelease }}
          replacesArtifacts: true
          artifacts: dist/*
          commit: ${{ inputs.ref || github.sha }}
          # Only fall back to GitHub's auto-generated notes when the caller
          # didn't supply its own (release.yaml passes Conventional-Commits
          # notes from semantic-release; nightly.yaml passes none).
          generateReleaseNotes: ${{ inputs.release_notes == '' && !inputs.prerelease }}

  sentry-release:
    name: Register release with Sentry
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      # `if:` conditions cannot reference the `secrets` context directly
      # (GitHub Actions rejects the workflow at parse time), so the token's
      # presence is checked here in a `run:` step - where secrets ARE
      # accessible - and the result exposed as a step output for later
      # steps to branch on.
      - name: Check for Sentry auth token
        id: sentry_auth
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      # Requires the SENTRY_AUTH_TOKEN repo secret (a Sentry auth token with
      # release-management scope). Skipped, not failed, until that secret is
      # added - registration is metadata on top of crash reporting, which
      # already works via SENTRY_DSN alone.
      - name: Create Sentry release
        if: steps.sentry_auth.outputs.present == 'true'
        uses: getsentry/action-release@v3
        env:
          # SENTRY_ORG/SENTRY_PROJECT come from the workflow-level `env:`
          # block above; the action reads them from the environment
          # automatically, no need to redeclare them here.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        with:
          # `SENTRY_PROJECT` alone does not scope the release to a project -
          # the action only passes `-p <project>` to sentry-cli when
          # `projects` is set, and without it the release is created
          # org-wide but unlinked from any project (Sentry then emails a
          # "release may not be linked with your project" warning).
          projects: ${{ env.SENTRY_PROJECT }}
          environment: ${{ inputs.prerelease && 'nightly' || 'production' }}
          # `version` is deprecated in favor of `release`; both accept the
          # same value, this just stops the deprecation warning in CI logs.
          release: ${{ inputs.tag }}
          set_commits: auto

      - name: Note skipped registration
        if: steps.sentry_auth.outputs.present != 'true'
        run: echo "::warning::SENTRY_AUTH_TOKEN not set - skipping Sentry release registration"
