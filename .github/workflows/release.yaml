name: Release

# Runs when `develop` is merged into `master`. Computes the next semver from
# Conventional Commits since the last version tag using semantic-release,
# tags `master`, then builds and publishes packages for macOS, Linux, and
# Windows with release notes generated from the commit history.
#
# Versioning/notes config lives in `.releaserc.yaml`. See
# openspec/changes/add-release-packaging-workflow for design rationale.

on:
  push:
    branches:
      - master

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Compute version, tag, and release notes
    runs-on: ubuntu-latest

    outputs:
      new_tag: ${{ steps.semantic.outputs.new_release_version }}
      new_version: ${{ steps.semantic.outputs.new_release_version }}
      release_notes: ${{ steps.semantic.outputs.new_release_notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute next version, tag, and release notes
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          # No "v" prefix, matching the existing tag scheme (e.g. `0.0.6`);
          # see `tagFormat` in `.releaserc.yaml`. Commits that don't follow
          # Conventional Commits don't fail this step: the
          # conventionalcommits preset just ignores them when computing the
          # next version (see the comment in `.releaserc.yaml`).
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package:
    name: Package and publish
    needs: version
    if: needs.version.outputs.new_tag
    uses: ./.github/workflows/package.yaml
    with:
      tag: ${{ needs.version.outputs.new_tag }}
      prerelease: false
      ref: master
      release_notes: ${{ needs.version.outputs.release_notes }}
    secrets: inherit
