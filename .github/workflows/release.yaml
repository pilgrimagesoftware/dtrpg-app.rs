name: Release

# Runs when `develop` is merged into `master`. Computes the next semver from
# Conventional Commits since the last version tag, tags `master`, then builds
# and publishes packages for macOS, Linux, and Windows.
#
# See openspec/changes/add-release-packaging-workflow for design rationale.

on:
  push:
    branches:
      - master

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Compute version and tag
    runs-on: ubuntu-latest

    outputs:
      new_tag: ${{ steps.version_calc.outputs.new_tag }}
      new_version: ${{ steps.version_calc.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version (dry run)
        id: version_calc
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # No "v" prefix, matching the existing tag scheme (e.g. `0.0.6`).
          tag_prefix: ""
          release_branches: master
          default_bump: patch
          dry_run: true
          # Non-semver tags (e.g. the rolling `nightly` tag) are ignored when
          # this action determines "the latest tag" because it only
          # considers tags that parse as valid semver.

      - name: Update Cargo.toml and commit
        if: steps.version_calc.outputs.new_tag
        run: |
          sed -i 's/^version = ".*"$/version = "${{ steps.version_calc.outputs.new_version }}"/' Cargo.toml
          git config --global user.email "ci@pilgrimagesoftware.com"
          git config --global user.name "Pilgrimage Software CI"
          git add Cargo.toml
          git commit -m "chore: release ${{ steps.version_calc.outputs.new_tag }} [skip ci]"
          git push origin HEAD:master

      - name: Create and push release tag
        if: steps.version_calc.outputs.new_tag
        run: |
          git tag -a "${{ steps.version_calc.outputs.new_tag }}" -m "Release ${{ steps.version_calc.outputs.new_tag }}"
          git push origin "${{ steps.version_calc.outputs.new_tag }}"

  package:
    name: Package and publish
    needs: version
    if: needs.version.outputs.new_tag
    uses: ./.github/workflows/package.yaml
    with:
      tag: ${{ needs.version.outputs.new_tag }}
      prerelease: false
      ref: master
    secrets: inherit
