name: Build and Test

# CI build/test only. Packaging and releases (nightly and tagged) moved to
# `package.yaml`/`nightly.yaml`/`release.yaml`; see
# openspec/changes/add-release-packaging-workflow.

on:
  push:
    branches:
      - master
      - develop
    paths:
      - "crates/**"
      - rust-toolchain.toml
      - Cargo.toml
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build/test on ${{ matrix.name }}

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - name: macOS
            os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: build
          args: --verbose --release --target ${{ matrix.target }} --features dtrpg-core/sentry

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: test
          args: --verbose --release --target ${{ matrix.target }} --features dtrpg-core/sentry

      - name: Add redirect index
        run: |
          echo '<meta http-equiv="refresh" content="0; url=dtrpg_sdk/index.html">' \
            > target/doc/index.html

      - name: Package
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: package
          args: --verbose --no-verify --allow-dirty

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: crate-${{ github.sha }}
          path: target/package/*.crate
          retention-days: 30

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ github.sha }}
          path: target/doc/
          retention-days: 30

      - name: Upload Pages artifact
        # if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc/
