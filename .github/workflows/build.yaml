name: Build and Test

on:
  push:
    branches:
      - master
      - develop
    paths:
      - "crates/**"
      - rust-toolchain.toml
      - Cargo.toml
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build/test on ${{ matrix.name }}

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native build on the runner's own architecture, no cross/Docker:
          # matches the `gnu` target and system-library install approach in
          # `package.yaml` (see that file's comments for the musl/wayland
          # rationale).
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # `macos-latest` runners are Apple Silicon (arm64); the Intel leg
          # cross-compiles via a second `rustup target add`, which works
          # without Docker since Apple's linker supports both Mac targets.
          - name: macOS (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # `rust-toolchain.toml` pins a specific channel, which rustup installs
      # lazily (without the cross target) the first time cargo runs in this
      # directory. Add the target explicitly so it's present on the pinned
      # toolchain, not just the transient "stable" one installed above.
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.target }}

      - name: Install Linux build dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsecret-1-dev \
            libasound2-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev

      - name: Build (release)
        uses: actions-rs/cargo@v1
        with:
          use-cross: false
          command: build
          args: --verbose --release --target ${{ matrix.target }} --features dtrpg-core/sentry

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          use-cross: false
          command: test
          args: --verbose --release --target ${{ matrix.target }} --features dtrpg-core/sentry
