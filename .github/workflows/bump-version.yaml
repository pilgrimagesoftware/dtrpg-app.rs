name: Bump version

# Manual escape hatch for out-of-band version bumps (e.g. forcing a major
# bump). Independent of, and not required by, the automated tagging that
# `release.yaml` performs on every push to `master` via Conventional
# Commits. Prefer letting `release.yaml` compute the version automatically;
# use this only when the automatic bump type needs to be overridden.

concurrency: ci-${{ github.ref }}

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "SemVer component to update"
        type: choice
        options:
          - major
          - minor
          - patch
        required: true

jobs:
  tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency: publish

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: ${{ github.event.inputs.bump || 'minor' }}
