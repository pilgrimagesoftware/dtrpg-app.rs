name: Nightly

# Builds and publishes a rolling `nightly` pre-release from the latest
# `develop` commit. See openspec/changes/add-release-packaging-workflow.

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    uses: ./.github/workflows/package.yaml
    with:
      tag: nightly
      prerelease: true
    secrets: inherit
