name: Nightly

# Builds and publishes a rolling `nightly` pre-release from the latest
# `develop` commit. See openspec/changes/add-release-packaging-workflow.

on:
  # 07:00 UTC targets midnight Pacific Daylight Time. GitHub Actions cron has
  # no timezone support, so this drifts to 11pm Pacific Standard Time for
  # roughly November-March.
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  package:
    uses: ./.github/workflows/package.yaml
    with:
      tag: nightly
      prerelease: true
    secrets: inherit
