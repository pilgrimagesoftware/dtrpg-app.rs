name: Windows Build Spike

# Manual-only trial build to confirm the pinned `gpui` revision compiles on
# `windows-latest`. Not part of the nightly/release path. Once this passes
# reliably, remove `continue-on-error` from the Windows leg in
# `package.yaml` and delete this workflow. See
# openspec/changes/add-release-packaging-workflow design.md Open Questions.

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --package dtrpg-core --target x86_64-pc-windows-msvc --verbose

      - name: Test
        run: cargo test --release --package dtrpg-core --target x86_64-pc-windows-msvc --verbose
