# semantic-release configuration. Invoked from .github/workflows/release.yaml
# via cycjimmy/semantic-release-action. Determines the next version from
# Conventional Commits since the last tag, updates Cargo.toml, commits, and
# tags master.
#
# Commits that don't follow Conventional Commits are not an error: the
# conventionalcommits preset simply ignores them when computing the next
# version (they contribute no release notes and no version bump), so a
# malformed commit message never fails this workflow. A release only runs
# when at least one commit since the last tag matches a release rule
# (feat/fix/perf/BREAKING CHANGE); otherwise semantic-release exits cleanly
# with no new version.
branches:
  - master
tagFormat: "${version}"
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
  - - "@semantic-release/release-notes-generator"
    - preset: conventionalcommits
      # The conventionalcommits preset already hides these types by default;
      # spelled out explicitly so release-note filtering is documented here
      # rather than relying on an implicit library default, matching the
      # explicit `skip = true` filtering used in the SDK repos' cliff.toml.
      presetConfig:
        types:
          - type: feat
            section: Features
          - type: fix
            section: Bug Fixes
          - type: perf
            section: Performance Improvements
          - type: revert
            section: Reverts
          - type: docs
            section: Documentation
            hidden: true
          - type: style
            section: Styles
            hidden: true
          - type: chore
            section: Miscellaneous Chores
            hidden: true
          - type: refactor
            section: Code Refactoring
            hidden: true
          - type: test
            section: Tests
            hidden: true
          - type: build
            section: Build System
            hidden: true
          - type: ci
            section: Continuous Integration
            hidden: true
  - - "@semantic-release/exec"
    - prepareCmd: "sed -i 's/^version = \".*\"$/version = \"${nextRelease.version}\"/' Cargo.toml"
  - - "@semantic-release/git"
    - assets:
        - Cargo.toml
      message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
